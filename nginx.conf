# Resolve the real scheme from the outer reverse proxy header.
# Prevents http:// redirect loops when SSL is terminated upstream.
map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Root redirect: honours X-Forwarded-Proto so the Location header uses
    # the correct scheme even when SSL is terminated by the outer proxy.
    location = / {
        return 302 $real_scheme://$host/id;
    }

    # Next.js static export: routes emitted as <route>.html or <route>/index.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Hashed build assets: cache forever.
    # add_header here inherits parent headers because of the "always" flag
    # on parent — but we must repeat security headers due to nginx add_header
    # inheritance rules (child block overrides parent completely).
    location /_next/static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
