server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # mirrors out/_redirects (generated for Cloudflare Pages, unused on nginx)
    # built explicitly without $server_port: nginx listens on the internal
    # container port 3000, which must not leak into the redirect seen behind
    # the reverse proxy
    location = / {
        return 302 $scheme://$host/id;
    }

    # Next.js static export: routes are emitted as <route>.html or <route>/index.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Hashed build assets: cache forever
    location /_next/static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
